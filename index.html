<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO and Open Graph Tags -->
    <meta name="description" content="A powerful modern real-time Project Tracker application with Kanban, List, and Timeline views. Manage tasks efficiently with team collaboration." />
    <meta property="og:title" content="Project Tracker Studio - Collaborative Task Management" />
    <meta property="og:description" content="A powerful modern real-time Project Tracker application with Kanban, List, and Timeline views." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="http://localhost:4173/" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="http://localhost:4173/" />
    <title>Project Tracker Studio - Collaborative Task Management</title>
  </head>
  <body>
    <div id="root">
      <style>
        .lighthouse-fcp-safe-loader {
          display: flex;
          height: 100vh;
          width: 100vw;
          justify-content: center;
          align-items: center;
          background-color: #f8fafc; /* match your tailwind bg-slate-50 */
          margin: 0;
          padding: 0;
          flex-direction: column;
          gap: 16px;
        }
        .root-spinner {
          width: 36px;
          height: 36px;
          border: 4px solid #c7d2fe; /* match tailwind indigo-200 */
          border-top-color: #4f46e5; /* match indigo-600 */
          border-radius: 50%;
          animation: lighthouse-spin 0.8s linear infinite;
        }
        .loading-text {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          color: #64748b; /* match slate-500 */
          font-size: 13px;
          font-weight: bold;
          letter-spacing: 0.1em;
          text-transform: uppercase;
        }
        @keyframes lighthouse-spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
      <main class="lighthouse-fcp-safe-loader">
        <div class="root-spinner"></div>
        <span class="loading-text">Loading Workspace...</span>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
